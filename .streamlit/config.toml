[theme]
primaryColor = "#0D4F6B"
backgroundColor = "#FAFBFC"
secondaryBackgroundColor = "#E8F1F5"
textColor = "#1A2332"
font = "sans serif"

[server]
headless = true
fileWatcherType = "none"
# Public demo: keep uploads modest (anti-abuse). Local CLI has no such cap.
maxUploadSize = 15
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false

[runner]
fastReruns = true
