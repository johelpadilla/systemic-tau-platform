datasets:
  synthetic_coupled_logistic:
    domain: synthetic
    title: "Logísticos acoplados (switch de acoplamiento)"
    path: null
    generator: coupled_logistic
    maturity: demo
    license: "Generated in-platform"
    variables: [x0, x1]
    event_fraction: 0.5
    T: 800
    seed: 3
    ground_truth: "coupling switch at T/2"
    default_params:
      window: 31
      stride: 2
      m: 3
      theta3: 0.10

  synthetic_ar_noise:
    domain: synthetic
    title: "AR ruido (control casi-nulo)"
    path: null
    generator: ar_noise
    maturity: demo
    license: "Generated in-platform"
    variables: [x0, x1, x2]
    event_index: null
    T: 800
    seed: 4
    ground_truth: "no designed transition"
    default_params:
      window: 31
      stride: 2
      m: 3
      theta3: 0.10

  cardiac_like_demo:
    domain: cardiology
    title: "Cardio-like RR sintético (reorg ~65%)"
    path: null
    generator: cardiac_like_rr
    maturity: demo
    license: "Generated in-platform"
    variables: [rr, abs_drr]
    event_fraction: 0.65
    T: 4000
    seed: 5
    ground_truth: "shared patho driver reorganizes RR–dRR after event_at"
    pedagogical_note: "Sandbox sintético; la cohorte real de referencia es SDDB/CCTP."
    default_params:
      window: 101
      stride: 5
      m: 3
      theta3: 0.08

  sddb_rr_38_demo:
    domain: cardiology
    title: "SDDB Record 38 — RR demo (export CCTP)"
    path: samples/sddb_rr_38_demo.csv
