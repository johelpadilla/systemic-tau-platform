meta:
  source: es
  locale: en
terms:
  - id: tau_s
    term: "Systemic Tau (τ_s)"
    short: "Ordinal–relational metric of coupling reorganization across variables."
    long: |
      In sliding windows, it summarizes changes in the shared order structure of a multivariate system.
      It does not ask “how much does each variable move?” but “how do order relations among them reorganize?”.
      It is interpreted together with classical EWS and RECD/excess3; the sign of its deltas is context-dependent.
    level: basic
    related: [recd, ews, bandt_pompe]

  - id: recd
    term: "RECD"
    short: "Discrete Extramental Clock — emergent time of the system."
    long: |
      Accumulation of ΔRECD advances generated by nested ordinal conjunctions (Φ₁–Φ₃),
      modulated by the λ regime (often tied to |τ_s|). It operationalizes Chronos (CSV index)
      vs Kairos (ticks weighted by reorganization). Implemented in nested-recd and Lab v1.0.
    level: basic
    related: [phi1, phi2, phi3, excess3, kairos]

  - id: phi1
    term: "Φ₁ (Level 1)"
    short: "Fraction of variable pairs sharing the same ordinal symbol at t."
    long: |
      Bandt–Pompe coincidence normalized to [0,1]. The smallest “doll” of the nested clock:
      necessary as a statistical base, insufficient alone for claims of emergence.
      Trap: high Φ₁ alone does not prove irreducible synergy.
    level: intermediate
    related: [phi2, bandt_pompe]

  - id: phi2
    term: "Φ₂ (Level 2)"
    short: "Persistence of pairwise ordinal relations for ≥ d steps."
    long: |
      Captures relational habits (EQ/GT/LT) that hold, not only flashes of equality.
      Typical parameter d=4. Useful for thinking hyper-persistence (e.g. dengue transmission regimes).
    level: intermediate
    related: [phi1, phi3]

  - id: phi3
    term: "Φ₃ (Level 3)"
    short: "Binary indicator of irreducible synergy above θ₃."
    long: |
      Fires when excess3 exceeds threshold θ₃ (≈0.08 in cardio CCTP; ≈0.10 default).
      On noisy data it can stay zero while excess3 still moves: that is why the continuous proxy is primary.
    level: intermediate
    related: [excess3, recd]

  - id: excess3
    term: "excess3"
    short: "Continuous proxy of irreducible ordinal synergy (Level 3)."
    long: |
      Combines excess total correlation beyond pairs and/or joint surprise vs independence.
      Primary metric in CCTP (mean_excess3 and its Δ). Not causality; symbolic irreducibility
      falsifiable with phase-shuffle surrogates.
    level: intermediate
    related: [phi3, surrogates, cctp]

  - id: bandt_pompe
    term: "Bandt–Pompe patterns"
    short: "Local permutation symbols of a series (ordinal embedding)."
    long: |
      With dimension m and delay τ one obtains an alphabet of m! patterns (m=3 → 6 symbols).
      Foundation of Φ₁–Φ₃ and permutation entropies. Invariant under monotone transforms.
      Practice it in the Mathematics sandbox before interpreting RECD.
    level: basic
    related: [tau_s, phi1]

  - id: ews
    term: "Classical EWS"
    short: "Univariate Early Warning Signals (var, AR1, etc.)."
    long: |
      Motivated by critical slowing down. Useful but incomplete when the transition is
      multivariate reorganization. Lab v1.0 computes them in parallel as a control panel
      (mandatory dual reading in teaching).
    level: basic
    related: [csd, tau_s]

  - id: csd
    term: "Critical Slowing Down"
    short: "Slower recovery near a bifurcation."
    long: |
      Predicts var↑ and AR1↑ in many potential models. Not the only generic route in real physiology:
      in CCTP, AR1 often falls despite a clear clinical transition.
    level: basic
    related: [ews]

  - id: breathing_window
    term: "Breathing Window"
    short: "Analysis window whose length adapts to the system’s regime."
    long: |
      Avoids the bias of a fixed W when internal tempo (RECD) changes.
      In Lab v1.0 the adaptive window is an operational extension; domain presets still use fixed W by default.
    level: advanced
    related: [tau_s, recd]

  - id: surrogates
    term: "Surrogates (IAAFT / phase-shuffle)"
    short: "Null series that preserve univariate properties and break the target structure."
    long: |
      Phase-shuffle (v1.0 core): preserves per-channel spectrum, destroys cross-dependence —
      natural null for “is the signal relational?”. IAAFT: preserves spectrum and distribution.
      Essential for p-values of Δτ_s and Δexcess3. Fast: n≈8; for citation: n≥50.
    level: intermediate
    related: [excess3, tau_s]

  - id: tda
    term: "TDA / Betti numbers"
    short: "Topological Data Analysis of the state cloud (Tier 4)."
    long: |
      Complements the temporal ordinal axis with topology (components, cycles).
      Costly; Full-mode horizon. Do not block learning of the τ_s+RECD core on it.
    level: advanced
    related: [tau_s]

  - id: cctp
    term: "CCTP"
    short: "Cardiac Critical Transitions Protocol."
    long: |
      Protocol and study applying τ_s + RECD to SDDB Holters before spontaneous VF (N=10 high quality).
      Key findings: classical panel often ambiguous (var↑, AR1↓); Δτ_s and Δexcess3 with surrogates;
      sign concordance 8/10. Main empirical anchor of platform v1.0.
    level: intermediate
    related: [tau_s, excess3, sddb]

  - id: sddb
    term: "SDDB"
    short: "Sudden Cardiac Death Holter Database (PhysioNet)."
    long: |
      Public Holters with pre-VF dynamics. Platform samples: records 38 (strong signal)
      and 51 (intermittent pacing). Original data require PhysioNet ToS compliance.
    level: intermediate
    related: [cctp]

  - id: kairos
    term: "Kairos vs Chronos"
    short: "System-significant time vs external clock time."
    long: |
      Chronos is the CSV or Holter index. Kairos are RECD ticks weighted by reorganization
      (composition of levels 2–3). Avoid confusing “more samples” with “more system time”.
    level: basic
    related: [recd]

  - id: delta_metric
    term: "Δ metric (baseline → approach)"
    short: "Change of a metric between a baseline window and a near-event window."
    long: |
      Unit of evidence in CCTP and the Lab: not an isolated peak, but a temporal contrast.
      Reported with surrogate p and sign concordance between τ_s and excess3.
    level: intermediate
    related: [tau_s, excess3, surrogates]

  - id: repro_hash
    term: "Reproducibility hash"
    short: "SHA-256 of parameters + metrics for one Lab run."
    long: |
      Lets you cite and audit a concrete numerical result of platform v1.0.
      If seed, W, m, or data change, the hash changes. Include it in reports and teaching notebooks.
    level: basic
    related: [surrogates]

  - id: lectura_dual
    term: "Dual reading"
    short: "Protocol: classical EWS panel + τ_s/RECD panel, without picking a side."
    long: |
      (1) var/AR1, (2) Δτ_s and Δexcess3 + p_surr, (3) sign concordance, (4) clinical/epidemiological context,
      (5) honest conclusion. Core competence that v1.0 trains in the Lab.
    level: basic
    related: [ews, tau_s, excess3]

  - id: iaaft
    term: "IAAFT"
    short: "Surrogate that preserves spectrum and amplitude distribution (per channel)."
    long: |
      Iterative Amplitude Adjusted Fourier Transform. Stricter than pure phase-shuffle:
      also keeps each channel’s PDF. In the Lab it is applied independently per variable
      to break cross-dependence under a more conservative null.
    level: advanced
    related: [surrogates]

  - id: ordinal_memory
    term: "Ordinal memory"
    short: "Symbolic MI of Bandt–Pompe patterns at lags (and cross-MI across variables)."
    long: |
      Optional complement (Full mode): measures how much order information is retained in time
      and across channels. Not full Transfer Entropy; an educational proxy of symbolic dependence.
    level: advanced
    related: [bandt_pompe, tau_s]

  - id: domain_preset
    term: "Domain preset"
    short: "Calibrated defaults (W, stride, m, θ₃) per domain: cardio, epi, neuro, eco, climate,\
  \ social, education, sleep, finance."
    long: |
      Cardiology uses W≈101 and θ₃≈0.08 (CCTP). Epidemiology uses short windows (W≈13).
      The domain adapter also suggests columns and the event label.
    level: basic
    related: [tau_s, recd, cctp]
