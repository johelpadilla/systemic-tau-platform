terms:
  - id: tau_s
    term: "Tau Sistémica (τ_s)"
    short: "Métrica ordinal-relacional de reorganización de acoplamiento entre variables."
    long: "En ventanas deslizantes, resume cambios en la estructura de orden compartida del sistema multivariado. No asume critical slowing down univariado."
    level: basico
    related: [recd, ews, bandt_pompe]

  - id: recd
    term: "RECD"
    short: "Reloj Extramental Discreto — tiempo emergente del sistema."
    long: "Acumulación de avances ΔRECD generados por conjunciones ordinales anidadas (Φ₁–Φ₃), modulados por el régimen λ(τ_s)."
    level: basico
    related: [phi1, phi2, phi3, excess3]

  - id: phi1
    term: "Φ₁ (Nivel 1)"
    short: "Fracción de pares de variables con el mismo símbolo ordinal en t."
    long: "Coincidencia Bandt–Pompe normalizada en [0,1]. Base estadística del reloj; necesaria pero no suficiente."
    level: intermedio
    related: [phi2, bandt_pompe]

  - id: phi2
    term: "Φ₂ (Nivel 2)"
    short: "Persistencia de relaciones ordinales de a pares durante ≥ d pasos."
    long: "Captura hábitos relacionales (EQ/GT/LT) que se sostienen, no solo destellos de igualdad."
    level: intermedio
    related: [phi1, phi3]

  - id: phi3
    term: "Φ₃ (Nivel 3)"
    short: "Indicador binario de sinergia irreducible por encima de θ₃."
    long: "Se activa cuando excess3 supera el umbral. En datos ruidosos se prefiere el continuo excess3."
    level: intermedio
    related: [excess3, recd]

  - id: excess3
    term: "excess3"
    short: "Proxy continuo de sinergia ordinal irreducible (Nivel 3)."
    long: "Combina exceso de correlación total respecto a pares y/o sorpresa conjunta vs independencia. Métrica primaria en CCTP."
    level: intermedio
    related: [phi3, surrogates]

  - id: bandt_pompe
    term: "Patrones Bandt–Pompe"
    short: "Símbolos de permutación local de una serie (embedding ordinal)."
    long: "Con dimensión m y delay τ se obtiene un alfabeto de m! patrones, base de Φ₁–Φ₃ y de muchas entropías de permutación."
    level: basico
    related: [tau_s, phi1]

  - id: ews
    term: "EWS clásicas"
    short: "Early Warning Signals univariadas (var, AR1, etc.)."
    long: "Motivadas por critical slowing down. Útiles pero incompletas cuando la transición es reorganización multivariada."
    level: basico
    related: [csd, tau_s]

  - id: csd
    term: "Critical Slowing Down"
    short: "Enlentecimiento de la recuperación cerca de una bifurcación."
    long: "Predice var↑ y AR1↑ en muchos modelos. No es la única vía genérica en fisiología real."
    level: basico
    related: [ews]

  - id: breathing_window
    term: "Breathing Window"
    short: "Ventana de análisis cuya longitud se adapta al régimen del sistema."
    long: "Evita el sesgo de una W fija cuando el 'tempo' interno (RECD) cambia. En Fast puede usarse W fija de dominio."
    level: avanzado
    related: [tau_s, recd]

  - id: surrogates
    term: "Surrogates (IAAFT / phase-shuffle)"
    short: "Series nulas que preservan propiedades univariadas y rompen estructura objetivo."
    long: "Phase-shuffle: preserva espectro por canal, destruye dependencia cruzada. IAAFT: preserva espectro y distribución. Esenciales para p-valores de Δτ_s y Δexcess3."
    level: intermedio
    related: [excess3, tau_s]

  - id: tda
    term: "TDA / Números de Betti"
    short: "Topological Data Analysis del cloud de estados (Tier 4)."
    long: "Complementa el eje ordinal temporal con topología (componentes, ciclos). Costoso; modo Full."
    level: avanzado
    related: [tau_s]

  - id: cctp
    term: "CCTP"
    short: "Cardiac Critical Transitions Protocol."
    long: "Protocolo y estudio que aplica τ_s + RECD a Holter SDDB previos a FV espontánea."
    level: intermedio
    related: [tau_s, excess3]

  - id: kairos
    term: "Kairos vs Chronos"
    short: "Tiempo significativo del sistema vs tiempo del reloj externo."
    long: "Chronos es el índice del CSV; Kairos son los ticks de RECD con peso de reorganización."
    level: basico
    related: [recd]
